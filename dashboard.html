<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Trading v8.3 Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;600;700&display=swap');
:root{--bg:#0a0b0d;--bg1:#111318;--bg2:#181c24;--bg3:#1e2330;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#e8eaf0;--muted:#6b7280;--dim:#3d4452;--green:#22c55e;--green-bg:rgba(34,197,94,.08);--red:#ef4444;--red-bg:rgba(239,68,68,.08);--amber:#f59e0b;--blue:#60a5fa;--accent:#818cf8;--gold:#fbbf24;--purple:#a78bfa;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
.w{max-width:1100px;margin:0 auto;padding:16px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.hdr-l{display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.title{font-size:17px;font-weight:700}.title span{color:var(--accent)}
.sub{font-size:10px;color:var(--muted);font-family:var(--mono)}
.live{display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid rgba(34,197,94,.2);border-radius:16px;background:var(--green-bg);font-size:10px;color:var(--green);font-family:var(--mono)}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse .8s infinite}
.cfg{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:11px}
.cfg input{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 8px;outline:none}
.cfg input:focus{border-color:var(--accent)}
.cfg-l{color:var(--muted);font-family:var(--mono)}
.btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--accent);color:#0a0b0d;font-family:var(--sans);font-size:11px;font-weight:600;cursor:pointer}
.grid{display:grid;gap:8px;margin-bottom:14px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g5{grid-template-columns:repeat(5,1fr)}
.g7{grid-template-columns:repeat(7,1fr)}
.stat{background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:10px 12px}
.stat-l{font-size:8px;font-family:var(--mono);color:var(--muted);letter-spacing:.04em;margin-bottom:4px;text-transform:uppercase}
.stat-v{font-size:19px;font-weight:700;font-family:var(--mono);letter-spacing:-1px}
.sec{font-size:8px;color:var(--muted);letter-spacing:.1em;margin:14px 0 6px;text-transform:uppercase}
.mc{background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:10px 12px;border-top:2px solid var(--dim)}
.mc-n{font-size:10px;font-weight:600;margin-bottom:3px}
.mc-wr{font-size:17px;font-weight:700;font-family:var(--mono)}
.mc-r{display:flex;justify-content:space-between;font-size:9px;font-family:var(--mono);color:var(--muted);padding:1px 0}
.mc-r b{font-weight:500;color:var(--text)}
.bar{height:3px;border-radius:2px;background:var(--bg3);overflow:hidden;margin-top:4px}
.bar-f{height:100%;border-radius:2px}
.open-card{background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:10px 12px;border-left:3px solid var(--amber);margin-bottom:6px}
.oc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.oc-sym{font-size:12px;font-weight:600}
.oc-badge{padding:2px 6px;border-radius:4px;font-size:8px;font-weight:600}
.b-buy{background:var(--green-bg);color:var(--green)}.b-sell{background:var(--red-bg);color:var(--red)}
.b-scp{background:rgba(96,165,250,.1);color:var(--blue)}.b-day{background:rgba(167,139,250,.1);color:var(--purple)}
.b-fvg{background:rgba(245,158,11,.1);color:var(--amber)}.b-sb{background:rgba(129,140,248,.1);color:var(--accent)}
.oc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;font-size:9px;font-family:var(--mono)}
.oc-lbl{color:var(--muted);font-size:8px}.oc-val{font-weight:500}
.tr-card{background:var(--bg1);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:6px}
.tr-card.win{border-left:3px solid var(--green)}.tr-card.loss{border-left:3px solid var(--red)}
.tr-top{display:flex;justify-content:space-between;padding:8px 10px;align-items:center}
.tr-info{display:flex;align-items:center;gap:6px}
.tr-badges{display:flex;gap:3px}
.tr-grid{display:grid;grid-template-columns:repeat(5,1fr);padding:4px 0;border-top:1px solid var(--border)}
.tr-cell{padding:4px 10px;border-right:1px solid var(--border);font-family:var(--mono);font-size:10px}
.tr-cell:last-child{border:none}
.tr-cell-l{font-size:7px;color:var(--muted);text-transform:uppercase;margin-bottom:1px}
.tbl{width:100%;border-collapse:collapse;font-size:10px;font-family:var(--mono)}
.tbl th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--muted);font-size:8px;font-weight:400;text-transform:uppercase}
.tbl td{padding:4px 8px;border-bottom:1px solid rgba(255,255,255,.02)}
.ai-bar{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.ai-n{font-size:10px;font-family:var(--mono);color:var(--muted);width:100px;flex-shrink:0}
.ai-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.ai-fill{height:100%;border-radius:2px}
.ai-s{font-size:10px;font-weight:500;font-family:var(--mono);width:40px;text-align:right}
.upd{text-align:center;font-size:10px;color:var(--dim);font-family:var(--mono);margin:10px 0;padding:6px;border-top:1px solid var(--border)}
.p{color:var(--green)}.n{color:var(--red)}.w{color:var(--amber)}
@media(max-width:700px){.g5,.g7{grid-template-columns:repeat(2,1fr)}.tr-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="w">
<div class="hdr">
  <div class="hdr-l"><div class="dot"></div><div><div class="title">AI <span>Trading v8.3</span></div><div class="sub">Smart OB + FVG MEDIUM + Silver Bullet — Axi · XAUUSD.s · EURUSD.s</div></div></div>
  <div class="live"><div class="ldot"></div><span id="ls">Connecting...</span></div>
</div>
<div class="cfg">
  <span class="cfg-l">Supabase</span>
  <input id="sbUrl" style="flex:1;min-width:180px" placeholder="https://xxxx.supabase.co">
  <input id="sbKey" type="password" style="flex:1;min-width:180px" placeholder="anon key">
  <button class="btn" onclick="go()">Connect</button>
</div>

<!-- STATS -->
<div class="grid g7" id="stats"></div>

<!-- OPEN POSITIONS -->
<div class="sec">Open positions <span id="openCount"></span></div>
<div id="openPos"><div style="padding:12px;text-align:center;color:var(--dim);font-size:11px">No open positions</div></div>

<!-- STRATEGY PERFORMANCE -->
<div class="sec">Strategy performance</div>
<div class="grid g7" id="modes"></div>

<!-- AI MODEL -->
<div class="sec">AI model</div>
<div id="aiModel" style="background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:14px"></div>

<!-- AI RESEARCH REPORT -->
<div class="sec">AI research report <span style="font-size:9px;color:var(--dim)">(auto-updates hourly)</span></div>
<div id="aiReport" style="background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:14px;font-size:11px;font-family:var(--mono);line-height:1.7;color:var(--muted)">Loading report...</div>

<!-- CLOSED TRADES -->
<div class="sec">Recent trades</div>
<div id="trades"></div>

<!-- MONTHLY -->
<div class="sec">Monthly report</div>
<div style="background:var(--bg1);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:14px">
<table class="tbl" id="monthly"><tr><th>Month</th><th>Trades</th><th>Wins</th><th>WR</th><th>P&L</th></tr></table>
</div>

<div class="upd" id="upd">—</div>
</div>

<script>
let SB='',SK='',T=null,D={trades:[],open:[],bal:{},stats:[]};
const MC={scalp:{c:'var(--blue)',ic:'◈',cls:'b-scp'},day:{c:'var(--purple)',ic:'⬡',cls:'b-day'},fvg:{c:'var(--amber)',ic:'◆',cls:'b-fvg'},sb:{c:'var(--accent)',ic:'⊕',cls:'b-sb'}};

function go(){
  SB=document.getElementById('sbUrl').value.trim();
  SK=document.getElementById('sbKey').value.trim();
  if(!SB||!SK){alert('ใส่ Supabase URL + Key');return}
  localStorage.setItem('sb_url',SB);localStorage.setItem('sb_key',SK);
  poll();if(T)clearInterval(T);T=setInterval(poll,8000);
}

async function sb(t,p=''){
  const r=await fetch(`${SB}/rest/v1/${t}?${p}`,{headers:{apikey:SK,Authorization:'Bearer '+SK}});
  return r.json();
}

async function poll(){
  try{
    const[tr,op,bl]=await Promise.all([
      sb('trades','select=*&order=id.desc&limit=100'),
      sb('open_trades','select=*&order=timestamp.desc'),
      sb('balance','select=*&id=eq.1')
    ]);
    D.trades=Array.isArray(tr)?tr:[];
    D.open=Array.isArray(op)?op:[];
    D.bal=bl&&bl[0]?bl[0]:{value:0};
    document.getElementById('ls').textContent='LIVE';
    render();
  }catch(e){document.getElementById('ls').textContent='Error';console.error(e)}
}

function render(){rStats();rOpen();rModes();rAI();rReport();rTrades();rMonthly();
  document.getElementById('upd').textContent='Updated: '+new Date().toLocaleString('th-TH')}

function rStats(){
  const tr=D.trades,bal=D.bal.value||0;
  const today=new Date().toISOString().slice(0,10);
  const tp=tr.filter(t=>t.timestamp&&t.timestamp.startsWith(today)).reduce((a,t)=>a+(t.pnl||0),0);
  const w=tr.filter(t=>t.outcome===1).length,wr=tr.length?Math.round(w/tr.length*100):0;
  const gw=tr.filter(t=>t.pnl>0).reduce((a,t)=>a+t.pnl,0);
  const gl=Math.abs(tr.filter(t=>t.pnl<=0).reduce((a,t)=>a+t.pnl,0));
  const pf=gl>0?(gw/gl).toFixed(1):'—';
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-l">Balance</div><div class="stat-v p">$${bal.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
    <div class="stat"><div class="stat-l">Today P&L</div><div class="stat-v" style="color:${tp>=0?'var(--green)':'var(--red)'}">${tp>=0?'+':''}$${tp.toFixed(2)}</div></div>
    <div class="stat"><div class="stat-l">Win Rate</div><div class="stat-v" style="color:${wr>=60?'var(--green)':wr>=40?'var(--amber)':'var(--red)'}">${wr}%</div></div>
    <div class="stat"><div class="stat-l">Total Trades</div><div class="stat-v">${tr.length}</div></div>
    <div class="stat"><div class="stat-l">Profit Factor</div><div class="stat-v" style="color:var(--blue)">${pf}</div></div>
    <div class="stat"><div class="stat-l">Open Now</div><div class="stat-v w">${D.open.length}</div></div>
    <div class="stat"><div class="stat-l">Total P&L</div><div class="stat-v" style="color:${gw-gl>=0?'var(--green)':'var(--red)'}">$${(gw-gl).toFixed(2)}</div></div>`;
}

function rOpen(){
  document.getElementById('openCount').textContent=D.open.length?`(${D.open.length})`:'';
  if(!D.open.length){document.getElementById('openPos').innerHTML='<div style="padding:12px;text-align:center;color:var(--dim);font-size:11px">No open positions</div>';return}
  document.getElementById('openPos').innerHTML=D.open.map(t=>{
    const m=t.mode||'';const mc=MC[m]||MC.fvg;const b=t.direction===1;
    const sc=t.symbol&&t.symbol.includes('XAU')?'var(--gold)':'var(--blue)';
    return`<div class="open-card"><div class="oc-top"><span class="oc-sym" style="color:${sc}">${t.symbol}</span><div style="display:flex;gap:3px"><span class="oc-badge ${b?'b-buy':'b-sell'}">${b?'▲ BUY':'▼ SELL'}</span><span class="oc-badge ${mc.cls}">${m.toUpperCase()}</span></div></div><div class="oc-grid"><div><div class="oc-lbl">Entry</div><div class="oc-val" style="color:var(--blue)">${t.entry_price}</div></div><div><div class="oc-lbl">SL</div><div class="oc-val n">${t.sl_price}</div></div><div><div class="oc-lbl">TP</div><div class="oc-val p">${t.tp_price}</div></div><div><div class="oc-lbl">Lots</div><div class="oc-val">${t.lots}</div></div></div></div>`}).join('')}

function rModes(){
  const modes=[
    {k:'XAUUSD.s',m:'scalp',n:'XAU Scalp',bc:'var(--gold)',r:'8%'},
    {k:'XAUUSD.s',m:'day',n:'XAU Day',bc:'var(--gold)',r:'10%'},
    {k:'XAUUSD.s',m:'fvg',n:'XAU FVG',bc:'var(--gold)',r:'10%'},
    {k:'XAUUSD.s',m:'sb',n:'XAU SB',bc:'var(--gold)',r:'8%'},
    {k:'EURUSD.s',m:'scalp',n:'EUR Scalp',bc:'var(--blue)',r:'5%'},
    {k:'EURUSD.s',m:'fvg',n:'EUR FVG',bc:'var(--blue)',r:'10%'},
    {k:'EURUSD.s',m:'sb',n:'EUR SB',bc:'var(--blue)',r:'8%'}
  ];
  document.getElementById('modes').innerHTML=modes.map(m=>{
    const mt=D.trades.filter(t=>t.symbol===m.k&&(t.mode===m.m||t.strategy===m.m));
    const n=mt.length,w=mt.filter(t=>t.outcome===1).length,wr=n?Math.round(w/n*100):0;
    const pnl=mt.reduce((a,t)=>a+(t.pnl||0),0);
    const mc=MC[m.m]||MC.fvg;
    return`<div class="mc" style="border-top-color:${m.bc}"><div class="mc-n">${mc.ic} ${m.n} <span style="color:var(--dim);font-weight:400;font-size:9px">${m.r}</span></div><div class="mc-wr" style="color:${wr>=60?'var(--green)':wr>=40?'var(--amber)':'var(--muted)'}">${wr}%</div><div class="mc-r"><span>Trades</span><b>${n}</b></div><div class="mc-r"><span>P&L</span><b style="color:${pnl>=0?'var(--green)':'var(--red)'}">${pnl>=0?'+':''}$${pnl.toFixed(2)}</b></div><div class="bar"><div class="bar-f" style="width:${wr}%;background:${wr>=60?'var(--green)':'var(--amber)'}"></div></div></div>`}).join('')}

function rAI(){
  // Placeholder until AI Engine provides data via health endpoint
  const n=D.trades.length;const trained=n>=30;
  document.getElementById('aiModel').innerHTML=`
    <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;font-weight:500">AI Learning Engine</span><span style="font-size:10px;font-family:var(--mono);color:${trained?'var(--green)':'var(--muted)'}">${trained?'Trained on '+n+' trades':'Need '+(30-n)+' more trades'}</span></div>
    <div class="bar" style="height:5px;margin-bottom:8px"><div class="bar-f" style="width:${Math.min(n/30*100,100)}%;background:${trained?'var(--green)':'var(--amber)'}"></div></div>
    <div style="font-size:9px;color:var(--dim);font-family:var(--mono)">Model auto-retrains every 50 trades. Features: direction, hour, strategy, SL distance, lot size, balance, drawdown</div>`}

function rReport(){
  const el=document.getElementById('aiReport');
  const tr=D.trades;
  if(!tr.length){el.innerHTML='<span style="color:var(--dim)">Waiting for trade data...</span>';return}
  let h='';
  h+='<div style="color:var(--text);font-weight:500;margin-bottom:6px">Strategy Performance</div>';
  const modes=['scalp','day','fvg','sb'];
  for(const m of modes){
    for(const s of ['XAUUSD.s','EURUSD.s']){
      const mt=tr.filter(t=>(t.mode===m||t.strategy===m)&&t.symbol===s);
      if(mt.length<2)continue;
      const w=mt.filter(t=>t.pnl>0),l=mt.filter(t=>t.pnl<=0);
      const wr=Math.round(w.length/mt.length*100);
      const avgW=w.length?(w.reduce((a,t)=>a+t.pnl,0)/w.length):0;
      const avgL=l.length?Math.abs(l.reduce((a,t)=>a+t.pnl,0)/l.length):1;
      const rr=avgL>0?(avgW/avgL).toFixed(2):'—';
      const pnl=mt.reduce((a,t)=>a+(t.pnl||0),0);
      const meets=wr>=70&&parseFloat(rr)>=1.5;
      const c=meets?'var(--green)':wr>=55?'var(--amber)':'var(--red)';
      const sn=s.includes('XAU')?'XAU':'EUR';
      h+=`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)"><span>${sn} ${m.toUpperCase()}</span><span>${mt.length}tr <span style="color:${c}">WR=${wr}%</span> R:R=${rr}${meets?' ★':''}</span></div>`;
    }
  }
  const hm={};tr.forEach(t=>{if(!t.timestamp)return;const hr=parseInt(t.timestamp.slice(11,13));if(!hm[hr])hm[hr]={w:0,l:0};if(t.pnl>0)hm[hr].w++;else hm[hr].l++});
  const hrs=Object.entries(hm).map(([h,v])=>({hour:parseInt(h),n:v.w+v.l,wr:Math.round(v.w/(v.w+v.l)*100)})).filter(x=>x.n>=3).sort((a,b)=>b.wr-a.wr);
  if(hrs.length>=3){
    h+='<div style="color:var(--text);font-weight:500;margin:8px 0 4px">Best/Worst Hours</div>';
    h+=`<span style="color:var(--green)">Best:</span> ${hrs.slice(0,3).map(x=>x.hour+':00('+x.wr+'%)').join(', ')}`;
    h+=`<br><span style="color:var(--red)">Worst:</span> ${hrs.slice(-3).reverse().map(x=>x.hour+':00('+x.wr+'%)').join(', ')}`;
  }
  h+='<div style="color:var(--text);font-weight:500;margin:8px 0 4px">Recommendations</div>';
  let recs=[];
  for(const m of modes){const mt=tr.filter(t=>t.mode===m||t.strategy===m);if(mt.length<5)continue;const wr=Math.round(mt.filter(t=>t.pnl>0).length/mt.length*100);if(wr<40)recs.push(`<span style="color:var(--red)">⚠ ${m.toUpperCase()}: WR ${wr}% → add filter</span>`);if(wr>=75)recs.push(`<span style="color:var(--green)">✓ ${m.toUpperCase()}: WR ${wr}% → increase risk</span>`);}
  if(!recs.length)recs.push('<span style="color:var(--dim)">Need 30+ trades for recommendations</span>');
  h+=recs.join('<br>');
  el.innerHTML=h;
}

function rTrades(){
  const tr=D.trades.slice(0,15);
  if(!tr.length){document.getElementById('trades').innerHTML='<div style="padding:16px;text-align:center;color:var(--dim);font-size:11px">Waiting for EA signals...</div>';return}
  document.getElementById('trades').innerHTML=tr.map(t=>{
    const w=t.pnl&&t.pnl>0,b=t.direction===1,m=(t.mode||t.strategy||'').toLowerCase();
    const sc=t.symbol&&t.symbol.includes('XAU')?'var(--gold)':'var(--blue)';
    const mc=MC[m]||MC.fvg;
    return`<div class="tr-card ${w?'win':'loss'}"><div class="tr-top"><div class="tr-info"><span style="font-size:12px;font-weight:600;color:${sc}">${t.symbol||'—'}</span></div><div class="tr-badges"><span class="oc-badge ${b?'b-buy':'b-sell'}">${b?'▲ BUY':'▼ SELL'}</span><span class="oc-badge ${mc.cls}">${(m||'?').toUpperCase()}</span><span class="oc-badge" style="background:${w?'var(--green-bg)':'var(--red-bg)'};color:${w?'var(--green)':'var(--red)'}">${w?'WIN':'LOSS'} ${t.pnl?(t.pnl>0?'+':'')+Number(t.pnl).toFixed(2):'—'}</span></div></div><div class="tr-grid"><div class="tr-cell"><div class="tr-cell-l">Entry</div>${t.entry_price||'—'}</div><div class="tr-cell"><div class="tr-cell-l">Close</div><span style="color:${w?'var(--green)':'var(--red)'}">${t.close_price||'—'}</span></div><div class="tr-cell"><div class="tr-cell-l">P&L</div><span style="color:${w?'var(--green)':'var(--red)'}">${t.pnl?(t.pnl>0?'+':'')+Number(t.pnl).toFixed(2):'—'}</span></div><div class="tr-cell"><div class="tr-cell-l">SL dist</div>${t.sl_dist?Number(t.sl_dist).toFixed(2):'—'}</div><div class="tr-cell"><div class="tr-cell-l">Time</div>${t.timestamp?t.timestamp.slice(5,16):''}</div></div></div>`}).join('')}

function rMonthly(){
  const tr=D.trades;if(!tr.length)return;const mo={};
  tr.forEach(t=>{if(!t.timestamp)return;const m=t.timestamp.slice(0,7);if(!mo[m])mo[m]={n:0,w:0,p:0};mo[m].n++;if(t.outcome===1)mo[m].w++;mo[m].p+=(t.pnl||0)});
  let h='<tr><th>Month</th><th>Trades</th><th>Wins</th><th>WR</th><th>P&L</th></tr>';
  Object.entries(mo).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([m,d])=>{
    const wr=d.n?Math.round(d.w/d.n*100):0;
    h+=`<tr><td>${m}</td><td>${d.n}</td><td style="color:var(--green)">${d.w}</td><td style="color:${wr>=60?'var(--green)':wr>=40?'var(--amber)':'var(--red)'}">${wr}%</td><td style="color:${d.p>=0?'var(--green)':'var(--red)'}">${d.p>=0?'+':''}$${d.p.toFixed(2)}</td></tr>`});
  document.getElementById('monthly').innerHTML=h}

window.onload=()=>{
  document.getElementById('sbUrl').value=localStorage.getItem('sb_url')||'';
  document.getElementById('sbKey').value=localStorage.getItem('sb_key')||'';
  if(document.getElementById('sbUrl').value&&document.getElementById('sbKey').value)go();
}
</script>
</body>
